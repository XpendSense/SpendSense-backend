version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/query/"
    schema: "internal/db/migrations/000001_init_schema.up.sql"
    gen:
      go:
        package: "db"
        out: "internal/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "pg_catalog.numeric"
            go_type: "github.com/jackc/pgx/v5/pgtype.Numeric"
