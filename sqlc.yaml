version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/query/"
    schema:
      - "internal/db/migrations/000001_init_schema.sql"
      - "internal/db/migrations/000002_seed_categories.sql"
      - "internal/db/migrations/000003_payment_method_soft_delete.sql"
      - "internal/db/migrations/000004_category_soft_delete.sql"
      - "internal/db/migrations/000005_income_person_attribution.sql"
      - "internal/db/migrations/000006_payment_method_person_attribution.sql"
      - "internal/db/migrations/000007_budget_person_soft_delete.sql"
      - "internal/db/migrations/000008_budget_rework.sql"
      - "internal/db/migrations/000009_savings.sql"
      - "internal/db/migrations/000010_drop_savings_recurring.sql"
      - "internal/db/migrations/000011_add_color.sql"
      - "internal/db/migrations/000012_income_complexity.sql"
      - "internal/db/migrations/000013_savings_tax_breakdown.sql"
      - "internal/db/migrations/000014_tax_reserve_per_person.sql"
      - "internal/db/migrations/000015_expense_allocation.sql"
      - "internal/db/migrations/000016_add_gas_auto_categories.sql"
      - "internal/db/migrations/000017_add_language_currency.sql"
      - "internal/db/migrations/000018_savings_rework.sql"
      - "internal/db/migrations/000019_savings_payment_days.sql"
      - "internal/db/migrations/000020_mark_transaction_paid.sql"
      - "internal/db/migrations/000021_fixed_expenses.sql"
      - "internal/db/migrations/000022_add_shopping_family_categories.sql"
      - "internal/db/migrations/000023_roles_and_invites.sql"
      - "internal/db/migrations/000024_fixed_expense_interval.sql"
    gen:
      go:
        package: "db"
        out: "internal/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "pg_catalog.numeric"
            go_type: "github.com/jackc/pgx/v5/pgtype.Numeric"
