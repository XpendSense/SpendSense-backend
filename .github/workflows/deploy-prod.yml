name: Deploy Prod

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

env:
  REGION: us-central1
  SERVICE: spendsense-backend
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/spendsense/backend

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: gen
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: gen/

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }} .
          docker push ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}

      - name: Migrate prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: go run ./cmd/migrate up

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}
          flags: --allow-unauthenticated
          env_vars: |
            ENV=prod
            CORS_ALLOWED_ORIGINS=${{ secrets.FRONTEND_URL }}
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            JWT_SECRET=JWT_SECRET:latest
