name: CI — Main

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: spendsense-backend
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/spendsense/backend

jobs:
  generate:
    name: Generate proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/buf-auth
        with:
          buf_token: ${{ secrets.BUF_TOKEN }}
      - name: Generate
        run: buf generate
      - uses: actions/upload-artifact@v4
        with:
          name: gen
          path: gen/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: gen
          path: gen/
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: gen
          path: gen/
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
      - name: Migrate prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: go run ./cmd/migrate up
      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --allow-unauthenticated --update-env-vars ^|^ENV=prod|CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}|GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}|GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            JWT_SECRET=JWT_SECRET:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
