name: CI — Main

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: wellspent-backend
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/wellspent/backend

jobs:
  generate:
    name: Generate proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/buf-auth
        with:
          buf_token: ${{ secrets.BUF_TOKEN }}
      - name: Generate
        run: buf generate
      - uses: actions/upload-artifact@v4
        with:
          name: gen
          path: gen/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: gen
          path: gen/
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: gen
          path: gen/
      - name: Decrypt prod config
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          SOPS_VERSION=3.9.4
          curl -fsSL -o /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          sudo install -m 755 /tmp/sops /usr/local/bin/sops
          mkdir -p ~/.config/sops/age
          printf '%s\n' "${SOPS_AGE_KEY}" > ~/.config/sops/age/keys.txt
          sops --decrypt .env.prod.enc > .env.prod
          set -a; source .env.prod; set +a
          printf 'FRONTEND_URL=%s\n'           "${FRONTEND_URL}"           >> $GITHUB_ENV
          printf 'GOOGLE_REDIRECT_URI=%s\n'    "${GOOGLE_REDIRECT_URI}"    >> $GITHUB_ENV
          printf 'GOOGLE_CLIENT_ID=%s\n'       "${GOOGLE_CLIENT_ID}"       >> $GITHUB_ENV
          printf 'PLAID_CLIENT_ID=%s\n'        "${PLAID_CLIENT_ID}"        >> $GITHUB_ENV
          printf 'RESEND_FROM_EMAIL=%s\n'      "${RESEND_FROM_EMAIL}"      >> $GITHUB_ENV
          printf 'PLAID_SYNC_ALERT_EMAIL=%s\n' "${PLAID_SYNC_ALERT_EMAIL}" >> $GITHUB_ENV
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
      - name: Migrate prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: go run ./cmd/migrate up
      - name: Deploy API — Cloud Run Service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --allow-unauthenticated --update-env-vars ^|^ENV=prod|CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}|PLAID_ENV=production|RATE_LIMIT_RPS=10|RATE_LIMIT_BURST=30
          env_vars: |
            FRONTEND_URL=${{ env.FRONTEND_URL }}
            GOOGLE_REDIRECT_URI=${{ env.GOOGLE_REDIRECT_URI }}
            GOOGLE_CLIENT_ID=${{ env.GOOGLE_CLIENT_ID }}
            PLAID_CLIENT_ID=${{ env.PLAID_CLIENT_ID }}
            RESEND_FROM_EMAIL=${{ env.RESEND_FROM_EMAIL }}
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            JWT_SECRET=JWT_SECRET:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            RESEND_API_KEY=RESEND_API_KEY:latest
            PLAID_SECRET=PLAID_SECRET:latest
            ENCRYPTION_KEY=ENCRYPTION_KEY:latest

      - name: Deploy cycle-budgets — Cloud Run Job
        run: |
          gcloud run jobs deploy cycle-budgets \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --command=./cycle-budgets \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --max-retries=1 \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy plaid-sync — Cloud Run Job
        run: |
          gcloud run jobs deploy plaid-sync \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --command=./plaid-sync \
            --set-env-vars=PLAID_ENV=production,PLAID_CLIENT_ID=${{ env.PLAID_CLIENT_ID }},RESEND_FROM_EMAIL=${{ env.RESEND_FROM_EMAIL }},PLAID_SYNC_ALERT_EMAIL=${{ env.PLAID_SYNC_ALERT_EMAIL }} \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,PLAID_SECRET=PLAID_SECRET:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest \
            --max-retries=1 \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Schedule cycle-budgets — 1st of each month
        run: |
          SA=$(gcloud config get-value account)
          URI="https://${{ env.REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ secrets.GCP_PROJECT_ID }}/jobs/cycle-budgets:run"
          ARGS=(
            http cycle-budgets-trigger
            --location=${{ env.REGION }}
            --schedule="0 0 1 * *"
            --uri="$URI"
            --message-body=""
            --oauth-service-account-email="$SA"
            --project=${{ secrets.GCP_PROJECT_ID }}
          )
          gcloud scheduler jobs update "${ARGS[@]}" 2>/dev/null \
            || gcloud scheduler jobs create "${ARGS[@]}"

      - name: Schedule plaid-sync — Mon / Wed / Fri
        run: |
          SA=$(gcloud config get-value account)
          URI="https://${{ env.REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ secrets.GCP_PROJECT_ID }}/jobs/plaid-sync:run"
          ARGS=(
            http plaid-sync-trigger
            --location=${{ env.REGION }}
            --schedule="0 9 * * *"
            --uri="$URI"
            --message-body=""
            --oauth-service-account-email="$SA"
            --project=${{ secrets.GCP_PROJECT_ID }}
          )
          gcloud scheduler jobs update "${ARGS[@]}" 2>/dev/null \
            || gcloud scheduler jobs create "${ARGS[@]}"
