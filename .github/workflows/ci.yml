name: CI

on:
  push:
    branches: [main, develop, 'feature/**']

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install buf
        run: |
          curl -sSL \
            "https://github.com/bufbuild/buf/releases/latest/download/buf-Linux-x86_64" \
            -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf

      - name: Authenticate buf
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: |
          if [ -n "$BUF_TOKEN" ]; then
            echo "$BUF_TOKEN" | buf registry login buf.build --token-stdin
          fi

      - name: Generate proto code
        run: buf generate

      - name: Install sops
        run: |
          curl -sSL \
            "https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64" \
            -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.AGE_SECRET_KEY }}
        run: sops --decrypt --output .env.dev .env.dev.enc

      - name: Run migrations
        run: |
          DATABASE_URL=$(grep '^DATABASE_URL=' .env.dev | cut -d= -f2- | tr -d '\r')
          goose -dir ./internal/db/migrations postgres "$DATABASE_URL" up

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
