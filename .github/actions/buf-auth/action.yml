name: Setup Buf and authenticate BSR
description: Installs buf CLI and logs in to the Buf Schema Registry

inputs:
  buf_token:
    description: BSR token for authenticating to buf.build
    required: true

runs:
  using: composite
  steps:
    - uses: bufbuild/buf-setup-action@v1
      with:
        github_token: ${{ github.token }}
    - name: Authenticate BSR
      shell: bash
      run: echo "${{ inputs.buf_token }}" | buf registry login buf.build --token-stdin
